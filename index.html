<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume Prime - Gerador de Visualização Realista</title>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #111111;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --gold: #D4AF37;
            --gold-dark: #B8860B;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        h1 {
            text-align: center;
            color: var(--gold);
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        section {
            margin-bottom: 30px;
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--gold);
        }
        input[type="file"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #222;
            color: var(--text-primary);
            font-size: 1rem;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        #preview {
            display: none;
            max-width: 100%;
            max-height: 300px;
            margin-top: 15px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        #generate {
            width: 100%;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--gold), var(--gold-dark));
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }
        #generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4);
        }
        #loading {
            display: none;
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #results {
            display: none;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .img-container {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #444;
            transition: transform 0.2s;
        }
        .img-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }
        .generated-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .download-btn {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }
        .download-btn:hover {
            background: var(--gold-dark);
        }
        #buy {
            width: 100%;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--gold), var(--gold-dark));
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: none;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .img-container { padding: 15px; }
        }
        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lume Prime</h1>
        <section>
            <label for="photo">Upload de foto (ambiente ou luminária atual):</label>
            <input type="file" id="photo" accept="image/*">
            <img id="preview">
        </section>
        <section>
            <label for="desc">Descrição da luminária:</label>
            <textarea id="desc" placeholder="Ex: luminária de mesa moderna em ouro e vidro, design minimalista, luz ambiente suave..."></textarea>
        </section>
        <button id="generate">🚀 GERAR VISUALIZAÇÃO REALISTA</button>
        <div id="loading">
            <div class="spinner"></div>
            Gerando 9 visualizações realistas com IA... Aguarde ~1 minuto!
        </div>
        <div id="results">
            <div class="grid" id="grid"></div>
        </div>
        <button id="buy">💰 Comprar Direto na Lume Prime</button>
    </div>
    <script>
        const photoInput = document.getElementById('photo');
        const preview = document.getElementById('preview');
        const desc = document.getElementById('desc');
        const generateBtn = document.getElementById('generate');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const grid = document.getElementById('grid');
        const buyBtn = document.getElementById('buy');

        photoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    preview.src = ev.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        generateBtn.addEventListener('click', async () => {
            const description = desc.value.trim();
            if (!description) {
                alert('Por favor, digite a descrição da luminária!');
                return;
            }

            generateBtn.style.display = 'none';
            loading.style.display = 'block';
            results.style.display = 'none';
            buyBtn.style.display = 'none';

            try {
                const prompt = `Uma visualização fotorealista de uma luminária ${description}, design luxuoso, alta qualidade, iluminação ambiente perfeita, estilo premium.`;

                const response = await fetch('https://api.craiyon.com/v3', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                if (!response.ok) {
                    throw new Error(`Erro na API: ${response.status}`);
                }

                const data = await response.json();

                loading.style.display = 'none';
                results.style.display = 'block';
                buyBtn.style.display = 'block';
                grid.innerHTML = '';

                data.images.forEach((imgData, index) => {
                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'img-container';

                    const img = document.createElement('img');
                    img.src = 'data:image/png;base64,' + imgData.base64;
                    img.alt = `Visualização ${index + 1}`;
                    img.className = 'generated-img';

                    const downloadBtn = document.createElement('a');
                    downloadBtn.href = img.src;
                    downloadBtn.download = `luminaria-realista-${index + 1}.png`;
                    downloadBtn.textContent = '⬇️ Baixar Imagem';
                    downloadBtn.className = 'download-btn';

                    imgContainer.appendChild(img);
                    imgContainer.appendChild(downloadBtn);
                    grid.appendChild(imgContainer);
                });
            } catch (error) {
                console.error(error);
                alert('Erro ao gerar imagens: ' + error.message + '\nTente novamente em alguns instantes.');
                generateBtn.style.display = 'block';
                loading.style.display = 'none';
            }
        });

        buyBtn.addEventListener('click', () => {
            alert('Redirecionando para a compra na Lume Prime! (Link placeholder)');
            // window.open('https://lumeprime.com/comprar', '_blank');
        });
    </script>
</body>
</html>
