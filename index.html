<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume Prime - IA Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-5">
    <div class="max-w-md mx-auto bg-gray-800 p-8 rounded-2xl shadow-2xl border border-yellow-600">
        <h1 class="text-2xl font-bold text-yellow-500 mb-4 text-center">Lume Prime IA</h1>
        <p class="text-gray-400 text-sm mb-6 text-center">Transforme seu ambiente com luz e sofisticação.</p>
        
        <div class="space-y-4">
            <input type="file" id="photo" class="w-full p-2 bg-gray-700 rounded border border-gray-600">
            <input type="text" id="prompt" placeholder="Ex: Uma luminária de tripé moderna no canto da sala" 
                   class="w-full p-3 bg-gray-700 rounded border border-gray-600 text-white">
            <button onclick="gerar()" id="btn" class="w-full bg-yellow-600 hover:bg-yellow-500 p-4 rounded-xl font-bold transition">
                GERAR VISUALIZAÇÃO REALISTA
            </button>
        </div>

        <div id="loading" class="hidden mt-6 text-center animate-pulse text-yellow-500">
            ⏳ A IA está decorando sua sala... (30s)
        </div>

        <div id="resultado" class="mt-6 hidden">
            <img id="img-res" src="" class="w-full rounded-lg border-2 border-yellow-500 shadow-lg">
            <button onclick="window.print()" class="w-full mt-4 text-xs text-gray-500 underline">Salvar Resultado</button>
        </div>
    </div>

    <script>
        async function gerar() {
            const btn = document.getElementById('btn');
            const loader = document.getElementById('loading');
            const resDiv = document.getElementById('resultado');
            const token = 'r8_CQIQVGrQMhKHHQY1DzRtlrRuYtvDXZr3FEI0c';

            btn.disabled = true;
            loader.classList.remove('hidden');
            resDiv.classList.add('hidden');

            // Simulação de chamada para o Replicate (Integração via API)
            setTimeout(() => {
                alert('Conectado ao servidor Replicate! Processando imagem...');
                loader.innerHTML = "✅ Imagem processada com sucesso!";
                btn.disabled = false;
            }, 3000);
        }
    </script>
</body>
</html>
